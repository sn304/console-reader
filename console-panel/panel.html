<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div class="console-header">
      <span class="console-title">&#9654; Console Reader</span>
      <div class="header-actions">
        <span class="btn-hide" title="Hide Reader (H)">[HIDE]</span>
      </div>
    </div>

    <div class="console-warnings">
      <span class="warning">&#9888; <span id="line-count">0</span> lines</span>
      <span class="info">&#9776; Ch<span id="chapter-num">1</span></span>
      <span class="font-controls">
        <button class="font-btn" id="btn-font-smaller" title="Smaller Font (Ctrl+-)">A-</button>
        <span id="font-size-display">13px</span>
        <button class="font-btn" id="btn-font-larger" title="Larger Font (Ctrl++)">A+</button>
      </span>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">&#128214;</div>
      <div class="empty-title">No book open</div>
      <div class="empty-hint">Double-click header or press O to open</div>
      <button class="console-btn primary" id="btn-open">Open EPUB File</button>
    </div>

    <div class="reader-content" id="reader-content" style="display:none;">
      <div class="chapter-title" id="chapter-title">Loading...</div>
      <div class="chapter-body" id="chapter-body"></div>
    </div>

    <div class="progress-bar">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-text"><span id="progress-percent">0</span>%</div>
    </div>

    <div class="nav-buttons">
      <button class="console-btn" id="btn-prev">&#8593; Up</button>
      <button class="console-btn" id="btn-toc">&#9776; Contents</button>
      <button class="console-btn" id="btn-next">Down &#8595;</button>
    </div>

    <!-- TOC Modal -->
    <div class="modal" id="toc-modal" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">&#9776; Chapter Navigation</div>
        <div class="chapter-list" id="chapter-list"></div>
        <div class="modal-footer">
          <button class="console-btn" id="btn-cancel">Cancel</button>
          <button class="console-btn primary" id="btn-jump">Jump</button>
        </div>
      </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept=".epub" style="display:none;">
  </div>

  <script src="pako.min.js"></script>
  <script src="../shared/storage.js"></script>
  <script src="epub-parser.js"></script>
  <script src="panel.js"></script>
</body>
</html>
